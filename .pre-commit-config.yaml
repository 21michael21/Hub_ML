repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--select=E9,F63,F7,F82"]
        files: ^(app\.py|core/.*|tools/.*|tests/.*)\.py$

  - repo: local
    hooks:
      - id: validate-resources
        name: validate resources
        entry: .venv/bin/python tools/validate_resources.py
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: .venv/bin/python -m pytest -q
        language: system
        pass_filenames: false
